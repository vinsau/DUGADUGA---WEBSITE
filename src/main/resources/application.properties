# Server Configuration
server.port=8080
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.cachecontrol.max-age=86400
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# Application Info
spring.application.name=Angel Rose Dugaduga Autobiography
info.app.name=Autobiography Website
info.app.version=2.0.0
info.app.description=Personal autobiography website with Spring Boot

# Logging
logging.level.root=INFO
logging.level.com.angelrose.autobiography=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
