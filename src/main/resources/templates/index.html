<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Angel Rose Dugaduga's Autobiography</title>

    <!-- SEO Meta Tags -->
    <meta name="description" th:content="${metaDescription}">
    <meta name="keywords" content="Angel Rose Dugaduga, autobiography, personal website, biography">
    <meta name="author" content="Angel Rose Y. Dugaduga">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Stylesheets -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/animations.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
</head>
<body>
    <!-- Skip to content -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Header Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Main Content -->
    <main id="main-content" role="main">
        <!-- Home Section -->
        <div th:replace="~{fragments/sections/home :: home}"></div>

        <!-- About Section -->
        <div th:replace="~{fragments/sections/about :: about}"></div>

        <!-- Education Section -->
        <div th:replace="~{fragments/sections/education :: education}"></div>

        <!-- Life Section -->
        <div th:replace="~{fragments/sections/life :: life}"></div>

        <!-- Hobbies Section -->
        <div th:replace="~{fragments/sections/hobbies :: hobbies}"></div>

        <!-- Albums Section -->
        <div th:replace="~{fragments/sections/albums :: albums}"></div>

        <!-- Contact Section -->
        <div th:replace="~{fragments/sections/contact :: contact}"></div>
    </main>

    <!-- Footer Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- JavaScript Modules -->
    <script th:src="@{/js/navigation.js}"></script>
    <script th:src="@{/js/animations.js}"></script>
    <script th:src="@{/js/gallery.js}"></script>
    <script th:src="@{/js/interactions.js}"></script>
</body>
</html>
